<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="tablet-container" style="display: none;">
        <div class="sidebar">
            <div class="brand">
                <i class="fas fa-gem logo-icon"></i>
                <div class="brand-text">
                    <h1>MINING JOB</h1>
                    <p>Mine rocks, ores and gems</p>
                </div>
            </div>

            <nav>
                <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-item"><i class="fas fa-trophy"></i> Leaderboard</div>
                <div class="nav-item"><i class="fas fa-pickaxe"></i> Tools</div>
                <div class="nav-item"><i class="fas fa-star"></i> Skills</div>
                <div class="nav-item"><i class="fas fa-tasks"></i> Tasks</div>
                <div class="nav-item"><i class="fas fa-store"></i> Market</div>
                <div class="nav-item"><i class="fas fa-truck-monster"></i> Vehicles</div>
                <div class="nav-item"><i class="fas fa-coins"></i> Sell</div>
            </nav>

            <div class="user-profile">
                <div class="user-avatar"></div>
                <div class="user-info">
                    <span class="user-role">Miner</span>
                    <span id="user-name" class="user-name">Carregando...</span>
                </div>
                <div class="user-lvl-circle">1</div>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <span class="section-title">OVERVIEW</span>
                <button class="close-btn" onclick="closeTablet()">Close <i class="fas fa-times-circle"></i></button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-value">$<span id="stat-earned">0</span></span>
                        <span class="stat-label">Total Earned</span>
                    </div>
                    <i class="fas fa-wallet stat-icon"></i>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span id="stat-mined" class="stat-value">0</span>
                        <span class="stat-label">Rocks Mined</span>
                    </div>
                    <i class="fas fa-mountain stat-icon"></i>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span id="stat-processed" class="stat-value">0</span>
                        <span class="stat-label">Ores Processed</span>
                    </div>
                    <i class="fas fa-boxstat-icon"></i>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span id="stat-gems" class="stat-value">0</span>
                        <span class="stat-label">Gems Cut</span>
                    </div>
                    <i class="fas fa-gem stat-icon"></i>
                </div>
                <div class="stat-card highlighted">
                    <div class="stat-info">
                        <span class="stat-value"><span id="stat-xp">0</span> XP</span>
                        <span class="stat-label">Total EXP Earned</span>
                    </div>
                    <i class="fas fa-sparkles stat-icon"></i>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span id="stat-points" class="stat-value">0</span>
                        <span class="stat-label">Skills Points</span>
                    </div>
                    <i class="fas fa-award stat-icon"></i>
                </div>
            </div>

            <div class="quick-jobs">
                <h2>QUICK JOBS <span>Solo</span></h2>
                <div class="job-list">
                    <div class="job-item">
                        <div class="job-img ruby"></div>
                        <div class="job-details">
                            <h3>Ruby Run <span class="tag">Ruby</span></h3>
                            <div class="job-reqs">
                                <span><i class="fas fa-mountain"></i> 3 Rocks</span>
                                <span><i class="fas fa-wallet"></i> $502 Reward</span>
                                <span><i class="fas fa-sparkles"></i> 100 Exp</span>
                            </div>
                        </div>
                        <button class="start-job">Start Job</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
