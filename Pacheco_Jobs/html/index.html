<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacheco Jobs Tablet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    
    <div id="tablet-container" style="display: none;">
        <div class="sidebar">
            <div class="brand">
                <i id="brand-icon" class="fas fa-gem logo-icon"></i>
                <div class="brand-text">
                    <h1 id="brand-title">JOB NAME</h1>
                    <p id="brand-subtitle">Subtitle</p>
                </div>
            </div>

            <nav id="sidebar-nav">
                <div class="nav-item active" data-target="dashboard"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-item" data-target="leaderboard"><i class="fas fa-trophy"></i> Leaderboard</div>
                <div class="nav-item" data-target="tools"><i class="fas fa-pickaxe"></i> Tools</div>
                <div class="nav-item" data-target="tasks"><i class="fas fa-tasks"></i> Tasks</div>
                <div class="nav-item" data-target="vehicles"><i class="fas fa-truck-monster"></i> Vehicles</div> </nav>

            <div class="user-profile">
                <div class="user-avatar"></div>
                <div class="user-info">
                    <span id="user-role" class="user-role">Role</span>
                    <span id="user-name" class="user-name">Carregando...</span>
                </div>
                <div id="user-level" class="user-lvl-circle">1</div>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <span id="section-title" class="section-title">OVERVIEW</span>
                <button class="close-btn" onclick="closeTablet()">Close <i class="fas fa-times-circle"></i></button>
            </div>

            <div id="dashboard-view">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-info"><span class="stat-value">$<span id="stat-earned">0</span></span><span class="stat-label">Total Earned</span></div>
                        <i class="fas fa-wallet stat-icon"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info"><span id="custom-val-1" class="stat-value">0</span><span id="custom-label-1" class="stat-label">Stat 1</span></div>
                        <i id="custom-icon-1" class="stat-icon"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info"><span id="custom-val-2" class="stat-value">0</span><span id="custom-label-2" class="stat-label">Stat 2</span></div>
                        <i id="custom-icon-2" class="stat-icon"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info"><span id="custom-val-3" class="stat-value">0</span><span id="custom-label-3" class="stat-label">Stat 3</span></div>
                        <i id="custom-icon-3" class="stat-icon"></i>
                    </div>
                    <div class="stat-card highlighted">
                        <div class="stat-info"><span class="stat-value"><span id="stat-xp">0</span> XP</span><span class="stat-label">Total EXP</span></div>
                        <i class="fas fa-sparkles stat-icon"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info"><span id="stat-points" class="stat-value">0</span><span class="stat-label">Points</span></div>
                        <i class="fas fa-award stat-icon"></i>
                    </div>
                </div>
            </div>

            <div id="leaderboard-view" style="display: none;">
                <div class="leaderboard-container">
                    <table class="leaderboard-table">
                        <thead>
                            <tr><th>#</th><th>Trabalhador</th><th>Total Itens</th><th>Nível</th></tr>
                        </thead>
                        <tbody id="leaderboard-results"></tbody>
                    </table>
                </div>
            </div>

            <div id="tools-view" style="display: none;">
                <div class="tools-grid" id="tools-list"></div>
            </div>

            <div id="tasks-view" style="display: none;">
                <div class="tasks-list" id="tasks-container"></div>
            </div>

            <div id="vehicles-view" style="display: none;">
                <div class="tools-grid" id="vehicles-list">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
