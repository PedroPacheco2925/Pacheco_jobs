<div id="washing-container" style="display: none;">
    <div class="washing-card">
        <div class="washing-header">
            <div class="washing-brand">
                <i class="fas fa-faucet-drip"></i>
                <div class="washing-title-group">
                    <h1>Lavagem de Pedras</h1>
                    <p>Processamento de Minério</p>
                </div>
            </div>
            <div class="stone-badge">
                <i class="fas fa-layer-group"></i>
                <span id="stone-total-count">0x</span>
            </div>
        </div>

        <div class="washing-area" id="main-washing-area">
            <div class="washing-slot origin" id="origin-zone">
                <div id="stone-item">
                    <img src="nui://ox_inventory/web/images/stone.png">
                </div>
            </div>
            <div class="washing-arrow"><i class="fas fa-chevron-right"></i></div>
            <div class="washing-slot target" id="drop-zone">
                <div id="drop-content">
                    <i class="fas fa-hand-holding-water"></i>
                    <span>LAVAR</span>
                </div>
                <div id="stone-deposited" style="display: none;">
                    <img src="nui://ox_inventory/web/images/stone.png" style="width: 60px; opacity: 0.8;">
                </div>
            </div>
        </div>

        <div id="quantity-modal" style="display: none;">
            <div class="modal-body">
                <h3>QUANTIDADE A LAVAR</h3>
                <div class="input-group">
                    <button onclick="changeQty(-1)">-</button>
                    <input type="number" id="wash-quantity" value="1" min="1">
                    <button onclick="changeQty(1)">+</button>
                </div>
                <button class="btn-confirm" onclick="confirmWashing()">INICIAR PROCESSO</button>
                <button class="btn-cancel" onclick="resetWashing()">CANCELAR</button>
            </div>
        </div>

        <div id="process-area" style="display: none;">
            <div class="process-info">
                <div class="batch-status">
                    <i class="fas fa-cog fa-spin"></i>
                    <span id="batch-text">A INICIAR...</span>
                </div>
                <div class="remaining-badge">
                    FALTAM <span id="batch-remaining">0</span>
                </div>
            </div>
            <div class="full-progress-bar">
                <div id="washing-fill"></div>
                <div id="progress-val-overlay">0%</div>
            </div>
        </div>
        
        <div class="washing-footer">
            <span>Pressiona <kbd>ESC</kbd> para sair</span>
        </div>
    </div>
</div>
