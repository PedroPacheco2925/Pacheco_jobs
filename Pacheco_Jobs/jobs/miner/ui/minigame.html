<div id="minigame-container" style="display: none;">
    <div class="mg-header">
        <span><i class="fas fa-hammer"></i>A minerar... </span>
        <span id="mg-percentage">0%</span>
    </div>
    
    <div class="mg-total-progress">
        <div id="mg-progress-fill"></div>
    </div>

    <div class="mg-game-area">
        <span class="mg-label weak">Fraco</span>
        <span class="mg-label over">Forte</span>
        
        <div id="mg-sweet-spot" class="mg-sweet-spot">
            <i class="fas fa-check"></i>
        </div>
        
        <div id="mg-cursor" class="mg-cursor"></div>
    </div>

    <div class="mg-footer">
        <span class="mg-btn">SPACE</span> para minerar    - Clicar F6 para Cancelar
    </div>
</div>
